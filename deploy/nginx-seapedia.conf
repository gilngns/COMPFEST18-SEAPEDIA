# ============================================================
# Nginx config SEAPEDIA — 2 subdomain (FE + API)
# Taruh di /etc/nginx/sites-available/seapedia lalu symlink ke sites-enabled.
# HTTPS block di-generate otomatis oleh Certbot (lihat panduan).
# ============================================================

# ---------- FRONTEND (React build statis) ----------
server {
    listen 80;
    server_name app.domain-lu.com;          # <-- ganti domain FE lu

    root /var/www/seapedia/SEAPEDIA-FE/dist; # hasil `npm run build`
    index index.html;

    # SPA fallback — semua route balik ke index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache aset statis
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    # proxy /api-docs langsung ke backend
    location /api-docs {
        proxy_pass http://127.0.0.1:5000/api-docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # proxy /api langsung ke backend jika menggunakan 1 domain (opsional)
    location /api {
        proxy_pass http://127.0.0.1:5000/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------- BACKEND API ----------
server {
    listen 80;
    server_name api.domain-lu.com;           # <-- ganti domain API lu

    client_max_body_size 6M;                 # >5M biar upload gambar (limit multer 5M) lolos

    # proxy semua ke Node (PM2) di port 5000
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # penting: biar Express tau ini HTTPS
    }
}
